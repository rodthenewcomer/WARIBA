# Rafraîchit les actualités (Sika Finance + Financial Afrik) toutes les
# 2 heures en journée, puis redéploie le site si de nouveaux articles
# sont arrivés. Limite assumée du site statique : la fraîcheur se compte
# en heures, pas à la seconde — passer sur un hébergement serveur (ISR)
# sera nécessaire pour du temps réel.
name: news

on:
  schedule:
    - cron: "10 5-19/2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - name: Récupérer les flux (stdlib Python uniquement)
        run: python3 scripts/news/fetch_news.py --out data/news/news.json
      - name: Committer les nouvelles actualités
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news
          if git diff --cached --quiet; then
            echo "Aucun nouvel article."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: actualités $(date -u '+%F %H:%M') UTC"
            git pull --rebase origin main
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: fetch-news
    if: needs.fetch-news.outputs.pushed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
